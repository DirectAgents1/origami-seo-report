<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Origami Command Center</title>
    <link rel="icon" type="image/png" href="/DA_logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Session keep-alive: refresh this site's own Identity token every 20 min and
         rewrite the isolated host-only cookie ori_seo_jwt, so an open dashboard is
         not logged out mid-use. gotrue-js loaded at runtime (Vite leaves it alone). -->
    <script type="module">
      (async () => {
        const run = (GoTrue) => {
          try {
            const a = new GoTrue({ APIUrl: '/.netlify/identity', setCookie: false });
            const u = a.currentUser();
            if (u) u.jwt().then((tok) => { if (tok) document.cookie = 'ori_seo_jwt=' + tok + '; Path=/; Secure; SameSite=Lax; Max-Age=3600'; }).catch(() => {});
          } catch (e) {}
        };
        try {
          const M = await import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm');
          const GoTrue = M.default || M;
          run(GoTrue);
          setInterval(() => run(GoTrue), 20 * 60 * 1000);
        } catch (e) {}
      })();
    </script>
<script>
/* Direct Agents usage tracker — one visit per session, fire-and-forget beacon (cannot affect the page). */
(function(){
  try{
    var DASH='origami-seo-report';
    var FLAG='da_v_'+DASH;
    if(sessionStorage.getItem(FLAG))return;
    function b64u(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';try{return decodeURIComponent(escape(atob(s)));}catch(e){try{return atob(s);}catch(e2){return '';}}}
    function readEmail(){
      var m=document.cookie.match(/(?:^|;\s*)nf_jwt=([^;]+)/);if(!m)return '';
      var p=m[1].split('.');if(p.length<3)return '';
      try{var o=JSON.parse(b64u(p[1]));return String(o.email||'').toLowerCase();}catch(e){return '';}
    }
    function go(){
      if(sessionStorage.getItem(FLAG))return;
      var e=readEmail();if(!e)return;
      sessionStorage.setItem(FLAG,'1');
      var payload=JSON.stringify({dashboard:DASH,email:e});
      try{
        var sent=false;
        if(navigator.sendBeacon){sent=navigator.sendBeacon('/.netlify/functions/log-visit', new Blob([payload],{type:'application/json'}));}
        if(!sent){fetch('/.netlify/functions/log-visit',{method:'POST',headers:{'content-type':'application/json'},body:payload,keepalive:true});}
      }catch(x){}
    }
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',go);else go();
    setTimeout(go,1500);
  }catch(e){}
})();
</script>
  </body>
</html>
