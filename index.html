<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Origami Command Center</title>
    <link rel="icon" type="image/png" href="/DA_logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Session keep-alive: refresh this site's own Identity token every 20 min and
         rewrite the isolated host-only cookie ori_seo_jwt, so an open dashboard is
         not logged out mid-use. gotrue-js loaded at runtime (Vite leaves it alone). -->
    <script type="module">
      (async () => {
        const run = (GoTrue) => {
          try {
            const a = new GoTrue({ APIUrl: '/.netlify/identity', setCookie: false });
            const u = a.currentUser();
            if (u) u.jwt().then((tok) => { if (tok) document.cookie = 'ori_seo_jwt=' + tok + '; Path=/; Secure; SameSite=Lax; Max-Age=3600'; }).catch(() => {});
          } catch (e) {}
        };
        try {
          const M = await import('https://cdn.jsdelivr.net/npm/gotrue-js@0.9.29/+esm');
          const GoTrue = M.default || M;
          run(GoTrue);
          setInterval(() => run(GoTrue), 20 * 60 * 1000);
        } catch (e) {}
      })();
    </script>
<!-- DA-USAGE-TRACKER -->
<script>
/* Direct Agents usage tracker (rich) — visit + section dwell, fire-and-forget beacons (cannot affect the page). */
(function(){
  try{
    var DASH='origami-seo-report';
    var LOG='/.netlify/functions/log-visit';
    function b64u(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';try{return decodeURIComponent(escape(atob(s)));}catch(e){try{return atob(s);}catch(e2){return '';}}}
    function readEmail(){var m=document.cookie.match(/(?:^|;\s*)nf_jwt=([^;]+)/);if(!m)return '';var p=m[1].split('.');if(p.length<3)return '';try{return String(JSON.parse(b64u(p[1])).email||'').toLowerCase();}catch(e){return '';}}
    var EMAIL=readEmail();
    if(!EMAIL) return; /* only track authenticated users */
    function beacon(obj){obj.dashboard=DASH;obj.email=EMAIL;var body=JSON.stringify(obj);try{if(navigator.sendBeacon&&navigator.sendBeacon(LOG,new Blob([body],{type:'application/json'})))return;fetch(LOG,{method:'POST',headers:{'content-type':'application/json'},body:body,keepalive:true});}catch(x){}}
    function device(){
      var ua=navigator.userAgent||'';
      var os='Other'; if(/Windows/i.test(ua))os='Windows';else if(/Mac OS X|Macintosh/i.test(ua))os='macOS';else if(/Android/i.test(ua))os='Android';else if(/iPhone|iPad|iPod/i.test(ua))os='iOS';else if(/Linux/i.test(ua))os='Linux';
      var br='Other'; if(/Edg\//i.test(ua))br='Edge';else if(/OPR\/|Opera/i.test(ua))br='Opera';else if(/Chrome\//i.test(ua)&&!/Chromium/i.test(ua))br='Chrome';else if(/Firefox\//i.test(ua))br='Firefox';else if(/Version\/.*Safari/i.test(ua))br='Safari';
      return {browser:br,os:os,mobile:/Mobi|Android|iPhone|iPad|iPod/i.test(ua)};
    }
    /* VISIT event, once per browser session */
    var VFLAG='da_v_'+DASH;
    if(!sessionStorage.getItem(VFLAG)){
      sessionStorage.setItem(VFLAG,'1');
      var d=device();
      beacon({type:'visit',browser:d.browser,os:d.os,mobile:d.mobile,referrer:(document.referrer||'').slice(0,200)});
    }
    /* SECTION dwell tracking (best-effort, generic across dashboards) */
    var cur=null,t0=Date.now();
    function sectionName(){
      var a=document.querySelector('.tab.active,[role="tab"][aria-selected="true"],[data-tab].active,nav .active,.nav-link.active');
      if(a&&a.textContent&&a.textContent.trim())return a.textContent.trim().slice(0,60);
      if(location.hash&&location.hash.length>1)return decodeURIComponent(location.hash.slice(1)).slice(0,60);
      return (document.title||'main').slice(0,60);
    }
    function flush(){
      if(cur===null)return;
      var secs=Math.round((Date.now()-t0)/1000);
      if(secs>=2&&secs<7200)beacon({type:'section',section:cur,seconds:secs});
      t0=Date.now();
    }
    function change(){var n=sectionName();if(n!==cur){flush();cur=n;}}
    cur=sectionName();t0=Date.now();
    document.addEventListener('click',function(){setTimeout(change,60);},true);
    window.addEventListener('hashchange',change);
    window.addEventListener('popstate',change);
    document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')flush();else t0=Date.now();});
    window.addEventListener('pagehide',flush);
  }catch(e){}
})();
</script>
<!-- /DA-USAGE-TRACKER -->
</body>
</html>
